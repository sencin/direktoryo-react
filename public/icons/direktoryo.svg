<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070b14"></stop>
      <stop offset="100%" stop-color="#0b1220"></stop>
    </linearGradient>

    <!-- Cabinet base material -->
    <linearGradient id="cab" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#223044"></stop>
      <stop offset="100%" stop-color="#0f1722"></stop>
    </linearGradient>

    <!-- Subtle top light -->
    <linearGradient id="topLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"></stop>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"></stop>
    </linearGradient>

    <!-- Shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000" flood-opacity="0.6"></feDropShadow>
    </filter>

  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"></rect>

  <!-- CABINET -->
  <g transform="translate(96,92)" filter="url(#shadow)">

    <!-- body -->
    <rect width="320" height="340" rx="28" fill="url(#cab)"></rect>

    <!-- top light wash (FIXED lighting direction) -->
    <rect width="320" height="120" rx="28" fill="url(#topLight)"></rect>

    <!-- inner frame -->
    <rect x="16" y="16" width="288" height="308" rx="22" fill="none" stroke="#2f415a" stroke-width="2" opacity="0.7"></rect>

    <!-- drawers -->
    <g stroke="#2a3a50" stroke-width="2">
      <line x1="0" y1="85" x2="320" y2="85"></line>
      <line x1="0" y1="170" x2="320" y2="170"></line>
      <line x1="0" y1="255" x2="320" y2="255"></line>
    </g>

    <!-- handles (slightly brighter top edge only) -->
    <g fill="#cbd5e1">
      <rect x="110" y="34" width="100" height="10" rx="5"></rect>
      <rect x="110" y="119" width="100" height="10" rx="5"></rect>
      <rect x="110" y="204" width="100" height="10" rx="5"></rect>
      <rect x="110" y="289" width="100" height="10" rx="5"></rect>
    </g>

    <!-- index dots (muted, not glowing) -->
    <g fill="#38bdf8" opacity="0.7">
      <circle cx="38" cy="42" r="3.5"></circle>
      <circle cx="38" cy="127" r="3.5"></circle>
      <circle cx="38" cy="212" r="3.5"></circle>
      <circle cx="38" cy="297" r="3.5"></circle>
    </g>

    <!-- search mark (subtle, no glow) -->
    <g transform="translate(238,22)" stroke="#38bdf8" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.9">

      <circle cx="20" cy="20" r="14"></circle>
      <line x1="31" y1="31" x2="46" y2="46"></line>
    </g>

  </g>

</svg>